<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>SE-Billing — เคลมยกเลิก</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1><a href="/">SE-Billing</a></h1>
    <div class="header-actions">
      <span id="status" class="status"></span>
      <div class="nav-links" id="nav-public">
        <a href="/">เรทราคา</a>
        <a href="/captures">รายละเอียด</a>
        <a href="/cancelled" class="active">เคลมยกเลิก</a>
      </div>
      <div class="nav-links hidden" id="nav-admin">
        <a href="/admin">เรทราคา</a>
        <a href="/admin/captures">รายละเอียด</a>
        <a href="/admin/cancelled" class="active">เคลมยกเลิก</a>
      </div>
      <button id="btn-refresh" class="btn">Refresh</button>
      <button id="btn-export" class="btn">Export Excel</button>
      <button id="btn-clear" class="btn btn-danger admin-only">Clear all</button>
      <button class="btn" onclick="logout()">ออกจากระบบ</button>
    </div>
  </header>

  <main>
    <div class="panel">
      <div class="panel-header">
        <h2>งานที่ถูกเลือก "ยกเลิกเคลม"</h2>
        <p class="hint">รายการที่ผู้สำรวจกดยืนยันการตรวจสอบ พร้อมเลือก radio "ยกเลิกเคลม" (cancel_case)</p>
        <div class="panel-actions">
          <input type="search" id="search" placeholder="ค้นจังหวัด/อำเภอ/พนักงานสำรวจ/เลขเคลม/เลขเซอร์เวย์..." class="search" />
          <select id="filter-province">
            <option value="">ทุกจังหวัด</option>
          </select>
          <span class="info" id="count"></span>
        </div>
      </div>
      <div class="table-wrap">
        <table class="captures-table">
          <thead>
            <tr>
              <th>วัน-เวลา</th>
              <th>เลขเคลม</th>
              <th>เลขเซอร์เวย์</th>
              <th>จังหวัด</th>
              <th>อำเภอ</th>
              <th>ตำบล</th>
              <th>MType</th>
              <th>พนักงานสำรวจ</th>
              <th>เจ้าหน้าที่ตรวจ</th>
              <th class="admin-only"></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="empty-state hidden" id="empty">ยังไม่มีรายการยกเลิกเคลม</div>
      </div>
      <div class="pager">
        <button id="prev" class="btn">« ก่อน</button>
        <span class="info" id="page-info"></span>
        <button id="next" class="btn">ถัด »</button>
      </div>
    </div>
  </main>

  <script src="/api.js"></script>
  <script src="/cancelled.js"></script>
</body>
</html>
